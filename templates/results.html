<div class="results-content">
  <div class="carousel-wrapper">
    <button type="button" class="carousel-arrow carousel-arrow-prev" aria-label="Resultat precedent" aria-disabled="true">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>
    <div class="carousel-viewport" role="region" aria-label="Resultats de recherche" tabindex="0">
      <div class="carousel-track">
        <div class="carousel-slide carousel-slide--spacer" aria-hidden="true"></div>
        {% for r in results %}
        <div class="carousel-slide">
          <div class="result-card"
               data-query="{{ query }}"
               data-book-title="{{ r.book_title }}"
               data-chapter="{{ r.chapter }}"
               data-verse="{{ r.verse }}"
               data-score="{{ r.score }}">
            <div class="card-header">
              <span><strong>{{ r.book_title }}</strong> — {{ r.chapter }}{% if r.verse %}:{{ r.verse }}{% endif %}</span>
              <span class="score-badge
                {%- if r.pct >= 80 %} score-high
                {%- elif r.pct >= 50 %} score-mid
                {%- elif r.pct >= 30 %} score-low
                {%- else %} score-minimal
                {%- endif %}">{{ r.label }} ({{ r.pct }}%)</span>
            </div>
            {% include "context_verses.html" %}
            <div class="card-footer">
              <button type="button" class="feedback-btn feedback-up"
                      data-feedback="up" aria-label="Pertinent" aria-pressed="false">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3H14z"/>
                  <path d="M7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/>
                </svg>
              </button>
              <button type="button" class="feedback-btn feedback-down"
                      data-feedback="down" aria-label="Non pertinent" aria-pressed="false">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3H10z"/>
                  <path d="M17 2h3a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2h-3"/>
                </svg>
              </button>
            </div>
          </div>
        </div>
        {% endfor %}
        <div class="carousel-slide carousel-slide--spacer" aria-hidden="true"></div>
      </div>
    </div>
    <button type="button" class="carousel-arrow carousel-arrow-next" aria-label="Resultat suivant">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </button>
  </div>
  <div class="carousel-dots" role="group" aria-label="Navigation des resultats"></div>
  <div class="carousel-live sr-only" aria-live="polite" aria-atomic="true"></div>
</div>
